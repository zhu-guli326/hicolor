# 重要：仓库根目录的 index.html 是开发用（引用 /src/main.tsx），不会出现在线上。
# 线上必须部署 npm run build 后的 dist/（含 assets/*.js）。
#
# 请到 GitHub：Settings → Pages → Build and deployment
#   「Source」必须选：GitHub Actions
#   不要选「Deploy from a branch」部署 main 根目录，否则没有 dist/assets → 控制台全是 404。
#
name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Vite 源码已在仓库根目录，不需要子目录路径
          CI: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
